services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - JWT_SECRET=${JWT_SECRET}
    volumes:
      # Mount the data folder so the SQLite database persists between container restarts
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
